name: Snapshot Service Main Build

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: snapshot-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wallet
          POSTGRES_PASSWORD: wallet
          POSTGRES_DB: wallet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wallet -d wallet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      INTERNAL_API_TOKEN: ci-internal-token
      SNAPSHOT_WORKER_ENABLED: "false"
      SNAPSHOT_SCHEDULER_ENABLED: "false"
      DEBUG_ENDPOINTS_ENABLED: "false"

    steps:
     - name: Checkout repository
       uses: actions/checkout@v6

     - name: Setup Python
       uses: actions/setup-python@v6
       with:
         python-version: "3.12"

     - name: Setup uv
       uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
       with:
         version: "0.11.16"
         enable-cache: true
         cache-dependency-glob: uv.lock

     - name: Verify and sync locked dependencies
       run: |
         uv lock --check
         uv sync --frozen --extra dev

     - name: Lint
       run: .venv/bin/ruff check .

     - name: Format check
       run: .venv/bin/ruff format --check .

     - name: Run tests
       run: .venv/bin/python -m pytest -v --tb=short

     - name: Run snapshot database migrations
       env:
         DATABASE_URL: postgresql+psycopg://wallet:wallet@localhost:5432/wallet
       run: |
         .venv/bin/alembic upgrade head
         .venv/bin/alembic current

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

  bump-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
  
    steps:
      - name: Checkout infrastructure repository
        uses: actions/checkout@v6
        with:
          repository: amysyutin/py_wallet-infra
          ref: main
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra
  
      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2
  
      - name: Update snapshot-service image
        working-directory: infra/manifests/snapshot-service
        run: |
          kustomize edit set image \
            ghcr.io/amysyutin/py_wallet-snapshot-service=ghcr.io/${{ github.repository }}:${{ github.sha }}
  
      - name: Commit and push infrastructure update
        working-directory: infra
        run: |
          git config user.name "py-wallet deploybot"
          git config user.email "deploybot@users.noreply.github.com"
          git add manifests/snapshot-service/kustomization.yaml
  
          if git diff --cached --quiet; then
            echo "Image tag is already up to date"
            exit 0
          fi
  
          git commit -m "deploy(snapshot): bump image to ${{ github.sha }}"
          git push origin main  
