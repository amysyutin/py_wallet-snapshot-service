name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v6

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          file_version="$(tr -d '[:space:]' < VERSION)"
          project_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          [[ "${tag_version}" =~ ^0\.[0-9]+\.[0-9]+$|^[1-9][0-9]*\.[0-9]+\.[0-9]+$ ]]
          test "${tag_version}" = "${file_version}"
          test "${tag_version}" = "${project_version}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote tested SHA image
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          commit_sha="$(git rev-parse HEAD)"
          docker buildx imagetools inspect "${image}:${commit_sha}"
          docker buildx imagetools create \
            --tag "${image}:${GITHUB_REF_NAME}" \
            "${image}:${commit_sha}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes
